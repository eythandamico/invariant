<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer ring — rotated square, represents transformation -->
  <rect x="20" y="2" width="25.46" height="25.46" rx="4" transform="rotate(45 20 20)" stroke="currentColor" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Inner square — stays constant, the invariant -->
  <rect x="11" y="11" width="18" height="18" rx="4" fill="currentColor"/>
</svg>
